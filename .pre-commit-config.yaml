repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v4.3.0
  hooks:
  - id: check-yaml
  - id: check-merge-conflict
  - id: check-toml
  - id: fix-byte-order-marker
  - id: mixed-line-ending
  - id: requirements-txt-fixer

- repo: https://github.com/igorshubovych/markdownlint-cli
  rev: v0.32.2
  hooks:
  - id: markdownlint-fix

- repo: local
  hooks:
  - id: ruff
    name: ruff
    entry: uv run --frozen scripts/pyrepo-check ruff
    language: system
    pass_filenames: false
    types: [python]
  - id: ty
    name: ty
    entry: uv run --frozen scripts/pyrepo-check ty
    language: system
    pass_filenames: false
    types: [python]
  - id: bandit
    name: bandit
    entry: uv run --frozen scripts/pyrepo-check bandit
    language: system
    pass_filenames: false
    types: [python]
