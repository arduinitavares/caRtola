name: cartola-data

on: 
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: check out source code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: install python
        run: uv python install 3.13.12

      - name: sync dependencies
        run: uv sync --locked --no-dev

      - name: download data
        run: uv run --frozen --no-dev python src/cartola/download_data.py

      - name: update readme
        run: uv run --frozen --no-dev python src/cartola/update_readme.py

      - name: commit files
        run: |
          git config --local user.email "arnaldo.g12@gmail.com"
          git config --local user.name "Arnaldo Gualberto"
          git add -f data/01_raw/
          git add README.md
          git diff --quiet && git diff --staged --quiet || git commit -am 'update cartola data'

      - name: push
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
